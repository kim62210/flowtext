<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowtext Playground</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header id="demo-header">
      <span class="logo"><span class="logo-tilde">~</span> flowtext</span>
      <nav id="preset-tabs"></nav>
      <div class="header-right">
        <span class="version">v0.1.0</span>
        <a
          href="https://github.com/kim62210/flowtext"
          class="github-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub repository"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </div>
    </header>
    <main id="demo-main">
      <aside id="editor-panel">
        <div id="editor-tabs"></div>
        <div id="editor-content">
          <div id="json-editor-container" class="editor-pane"></div>
          <div id="property-panel-container" class="editor-pane" hidden></div>
        </div>
      </aside>
      <section id="renderer-panel">
        <div id="renderer-labels">
          <span class="renderer-label renderer-label--svg">SVG</span>
          <span class="renderer-label renderer-label--canvas">Canvas</span>
          <span class="renderer-label renderer-label--ascii">ASCII</span>
        </div>
        <div id="renderers">
          <div id="renderer-svg" class="renderer-container"></div>
          <div id="renderer-canvas" class="renderer-container"></div>
          <div id="renderer-ascii" class="renderer-container"></div>
        </div>
      </section>
    </main>
    <div id="loading-overlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>Loading layout engine...</p>
      </div>
    </div>
    <div id="error-overlay" hidden>
      <div class="error-content">
        <p id="error-message"></p>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
