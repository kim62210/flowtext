<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowtext Playground</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f4eee2;
        --panel: rgba(255, 252, 246, 0.86);
        --panel-border: #d8c8ae;
        --panel-border-strong: #bca98b;
        --text: #1f1a15;
        --text-muted: #675b4d;
        --accent: #14343d;
        --accent-soft: #d7e6ea;
        --shadow: 0 28px 80px rgba(46, 35, 17, 0.12);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.65), transparent 28%),
          linear-gradient(180deg, #f6f0e6 0%, #eee4d3 100%);
        color: var(--text);
      }

      main {
        max-width: 1500px;
        margin: 0 auto;
      }

      .playground {
        display: grid;
        gap: 24px;
      }

      .playground-hero {
        display: grid;
        gap: 12px;
      }

      .playground-kicker {
        margin: 0;
        color: var(--text-muted);
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .playground-hero h1 {
        margin: 0;
        max-width: 18ch;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.25rem, 4vw, 4rem);
        line-height: 0.96;
      }

      .playground-intro {
        margin: 0;
        max-width: 62ch;
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .playground-grid {
        display: grid;
        grid-template-columns: minmax(260px, 300px) minmax(0, 1fr) minmax(260px, 300px);
        gap: 20px;
        align-items: start;
      }

      .panel {
        display: grid;
        gap: 16px;
        padding: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .panel-head {
        display: grid;
        gap: 6px;
      }

      .panel-head-secondary {
        margin-top: 8px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 1rem;
      }

      .panel-subhead {
        display: grid;
        gap: 4px;
        margin-top: 4px;
      }

      .panel-subhead h3,
      .panel-subhead p {
        margin: 0;
      }

      .panel-subhead h3 {
        font-size: 0.92rem;
      }

      .panel-subhead p {
        color: var(--text-muted);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .panel-head p,
      .panel-status {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .control {
        display: grid;
        gap: 10px;
      }

      .control-toggle {
        padding: 12px 14px;
        border: 1px solid rgba(188, 169, 139, 0.48);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.46);
      }

      .control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.95rem;
      }

      .control output {
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
      }

      .toggle-caption {
        color: var(--text-muted);
        font-size: 0.84rem;
      }

      .playground-select,
      .control input[type="range"] {
        width: 100%;
      }

      .playground-select {
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid var(--panel-border-strong);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font: inherit;
      }

      .control input[type="range"] {
        accent-color: var(--accent);
      }

      .preview-panel {
        gap: 14px;
      }

      .preview-surface {
        display: grid;
        place-items: center;
        min-height: 560px;
        padding: 12px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 252, 246, 0.95), rgba(247, 242, 233, 0.9));
        border: 1px solid rgba(188, 169, 139, 0.7);
        overflow: auto;
      }

      .preview-surface svg {
        max-width: 100%;
        height: auto;
      }

      .compare-shell {
        display: grid;
        gap: 14px;
        width: 100%;
      }

      .compare-kicker {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .compare-panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(188, 169, 139, 0.62);
      }

      .compare-panel h3 {
        margin: 0;
        font-size: 0.95rem;
      }

      .panel-stack {
        display: grid;
        gap: 12px;
      }

      .invariant-list,
      .summary-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .invariant-list {
        display: grid;
        gap: 10px;
      }

      .invariant-item {
        display: grid;
        gap: 4px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(188, 169, 139, 0.58);
      }

      .invariant-label,
      .invariant-detail {
        margin: 0;
      }

      .invariant-label {
        font-weight: 600;
      }

      .invariant-detail {
        color: var(--text-muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .summary-list {
        display: grid;
        gap: 10px;
      }

      .summary-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(20, 52, 61, 0.06);
      }

      .summary-row dt,
      .summary-row dd {
        margin: 0;
      }

      .summary-row dt {
        color: var(--text-muted);
      }

      .summary-row dd {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
      }

      @media (max-width: 1180px) {
        .playground-grid {
          grid-template-columns: 1fr;
        }

        .preview-surface {
          min-height: 0;
        }

        .compare-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app"></div>
    </main>
    <script type="module" src="./src/browser.ts"></script>
  </body>
</html>
